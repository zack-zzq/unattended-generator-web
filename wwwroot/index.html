<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Windows 无人值守安装应答文件生成器，轻松创建 autounattend.xml。" />
    <title>Windows 无人值守安装生成器</title>
    <base href="/" />
    <style>
        :root {
            --loading-bg: #f6f8fb;
            --loading-surface: #ffffff;
            --loading-text: #0f172a;
            --loading-muted: #5b6b7c;
            --loading-border: #dbe3ea;
            --loading-primary: #0b8aa6;
            --loading-primary-dark: #0f766e;
            --loading-shadow: 0 22px 60px rgba(15, 23, 42, 0.12);
        }

        .boot-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            color: var(--loading-text);
            background:
                linear-gradient(180deg, rgba(232, 244, 247, 0.82) 0, rgba(246, 248, 251, 0) 340px),
                var(--loading-bg);
            font-family: "Inter", "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
        }

        .boot-shell,
        .boot-shell * {
            box-sizing: border-box;
        }

        .boot-panel {
            width: min(calc(100vw - 3rem), 420px);
            display: grid;
            gap: 1.15rem;
            padding: 1.35rem;
            border: 1px solid var(--loading-border);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: var(--loading-shadow);
        }

        .boot-brand {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }

        .boot-logo {
            width: 48px;
            height: 48px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            padding: 9px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--loading-primary), var(--loading-primary-dark));
            box-shadow: 0 14px 28px rgba(11, 138, 166, 0.22);
        }

        .boot-logo span {
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.92);
        }

        .boot-copy {
            min-width: 0;
            display: grid;
            gap: 0.2rem;
        }

        .boot-title {
            font-size: 1.02rem;
            font-weight: 750;
            line-height: 1.25;
        }

        .boot-subtitle {
            color: var(--loading-muted);
            font-size: 0.875rem;
            line-height: 1.45;
        }

        .boot-progress {
            height: 8px;
            overflow: hidden;
            border-radius: 999px;
            background: #e6edf3;
        }

        .boot-progress::before {
            content: "";
            display: block;
            width: 42%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--loading-primary), #11a7a7);
            animation: bootProgress 1.2s ease-in-out infinite;
        }

        .boot-skeleton {
            display: grid;
            gap: 0.55rem;
        }

        .boot-skeleton span {
            height: 10px;
            border-radius: 999px;
            background: #edf2f7;
        }

        .boot-skeleton span:nth-child(1) {
            width: 88%;
        }

        .boot-skeleton span:nth-child(2) {
            width: 64%;
        }

        @keyframes bootProgress {
            0% {
                transform: translateX(-115%);
            }

            50% {
                transform: translateX(82%);
            }

            100% {
                transform: translateX(250%);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .boot-progress::before {
                animation: none;
                transform: translateX(65%);
            }
        }

        @media (max-width: 480px) {
            .boot-shell {
                padding: 1rem;
            }

            .boot-panel {
                width: 100%;
                max-width: 300px;
                gap: 1rem;
                padding: 1rem;
            }

            .boot-brand {
                gap: 0.75rem;
            }

            .boot-logo {
                width: 44px;
                height: 44px;
                padding: 8px;
            }

            .boot-title {
                font-size: 0.96rem;
            }
        }
    </style>
    <link rel="stylesheet" href="app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div class="boot-shell">
            <div class="boot-panel" role="status" aria-live="polite">
                <div class="boot-brand">
                    <div class="boot-logo" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div class="boot-copy">
                        <div class="boot-title">正在加载配置工作台</div>
                        <div class="boot-subtitle">Windows 无人值守安装生成器</div>
                    </div>
                </div>
                <div class="boot-progress" aria-hidden="true"></div>
                <div class="boot-skeleton" aria-hidden="true">
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        发生了未处理的错误。
        <a href="." class="reload">重新加载</a>
        <span class="dismiss">×</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        function downloadFile(filename, base64Content) {
            const link = document.createElement('a');
            link.href = 'data:application/xml;base64,' + base64Content;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>

</html>
